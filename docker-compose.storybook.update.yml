# Override to regenerate visual regression baselines inside Docker (Linux).
# Usage: docker compose -f docker-compose.storybook.yml -f docker-compose.storybook.update.yml up --abort-on-container-exit --exit-code-from test-runner
services:
  test-runner:
    command: pnpm exec test-storybook --url http://storybook:6006 --updateSnapshot
